services:
  - type: web
    name: voyageai-trip-planner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 600
    envVars:
      - key: GROQ_API_KEY
        sync: false        # Set in Render dashboard
      - key: SERPER_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: AVIATIONSTACK_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
