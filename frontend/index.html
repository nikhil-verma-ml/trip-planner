<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner | Professional Travel Planning</title>
    <meta name="description" content="Plan your perfect trip with our AI-powered travel planner using CrewAI.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>AI Trip <span class="accent">Planner</span></h1>
            <p>Your personalized journey, orchestrated by 6 specialized agents.</p>
        </header>

        <main>
            <section class="planner-card">
                <form id="planner-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="origin_city">Origin City</label>
                            <input type="text" id="origin_city" placeholder="e.g., Delhi" required>
                        </div>
                        <div class="form-group">
                            <label for="destination">Destination</label>
                            <input type="text" id="destination" placeholder="e.g., London" required>
                        </div>
                        <div class="form-group">
                            <label for="travel_dates">Dates (Text)</label>
                            <input type="text" id="travel_dates" placeholder="e.g., 20-25 Oct" required>
                        </div>
                        <div class="form-group">
                            <label for="date_yyyymmdd">Date (YYYY-MM-DD)</label>
                            <input type="date" id="date_yyyymmdd" required>
                        </div>
                        <div class="form-group">
                            <label for="num_travellers">Travellers</label>
                            <input type="number" id="num_travellers" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="budget_inr">Budget (INR)</label>
                            <input type="number" id="budget_inr" placeholder="e.g., 100000" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="interests">Interests & Preferences</label>
                            <textarea id="interests" rows="3" placeholder="e.g., Luxury stay, food tours, local culture, budget friendly..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>Travel Mode</label>
                            <div class="radio-group">
                                <label><input type="radio" name="travel_mode" value="flight" checked> Flight</label>
                                <label><input type="radio" name="travel_mode" value="train"> Indian Railways</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" id="submit-btn">Generate Itinerary</button>
                </form>
            </section>

            <section id="progress-section" class="hidden">
                <div class="progress-card">
                    <h3>Pipeline Status</h3>
                    <div class="pipeline-visual">
                        <div class="agent-step" data-step="1">
                            <div class="step-icon">🔍</div>
                            <span>Research</span>
                        </div>
                        <div class="line"></div>
                        <div class="agent-step" data-step="2">
                            <div class="step-icon">☁️</div>
                            <span>Weather</span>
                        </div>
                        <div class="line"></div>
                        <div class="agent-step" data-step="3">
                            <div class="step-icon">🏨</div>
                            <span>Hotels</span>
                        </div>
                        <div class="line"></div>
                        <div class="agent-step" data-step="4">
                            <div class="step-icon">✈️</div>
                            <span>Tickets</span>
                        </div>
                        <div class="line"></div>
                        <div class="agent-step" data-step="5">
                            <div class="step-icon">📅</div>
                            <span>Planner</span>
                        </div>
                        <div class="line"></div>
                        <div class="agent-step" data-step="6">
                            <div class="step-icon">💰</div>
                            <span>Budget</span>
                        </div>
                    </div>
                    <p id="status-text">Waking up agents...</p>
                </div>
            </section>

            <section id="result-section" class="hidden">
                <div class="result-card">
                    <div id="itinerary-content" class="markdown-body"></div>
                    <button id="download-btn">Download Itinerary</button>
                    <button id="reset-btn">Plan Another Trip</button>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/markdown.js"></script>
    <script src="assets/js/pipeline.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
